syntax = "proto3";

package raftkv.v1;

option go_package = "github.com/juanjuandog/mini-raftkv/internal/pb";

service RaftKV {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (MutateResponse);
  rpc Delete(DeleteRequest) returns (MutateResponse);
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  string op = 3;
  string key = 4;
  string value = 5;
  string client_id = 6;
  uint64 request_id = 7;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string value = 2;
  string leader_id = 3;
  string error = 4;
}

message PutRequest {
  string key = 1;
  string value = 2;
  string client_id = 3;
  uint64 request_id = 4;
}

message DeleteRequest {
  string key = 1;
  string client_id = 2;
  uint64 request_id = 3;
}

message MutateResponse {
  bool ok = 1;
  string leader_id = 2;
  string error = 3;
}
